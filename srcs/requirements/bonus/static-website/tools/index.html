<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Website</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    .card {
      max-width: 600px;
      background: white;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="card">
    Static websites are websites that do not require a database or server-side processing (like PHP).  
    They are built directly from pre-written HTML, CSS, and JavaScript files.
  </div>
</body>
</html>
