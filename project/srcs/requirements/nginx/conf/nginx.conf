events {}

http {
server {
        listen 443 ssl;
        server_name atursun.42.fr;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;

	ssl_certificate /etc/ssl/certs/cert.pem;
	ssl_certificate_key /etc/ssl/private/key.pem;

     	root /var/www/html;
        index index.html;

        location / {
                try_files $uri $uri/ =404;
        }
}

}
